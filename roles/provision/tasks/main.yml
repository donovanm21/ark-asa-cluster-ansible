---
- name: Install base OS dependencies
  apt:
    name:
      - htop
      - git
      - curl
      - lsof
      - bzip2
      - ca-certificates
      - jq
      - tar
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create the asa server group
  group:
    name: "{{ asa_group }}"
    state: present

- name: Create the asa server user account
  user:
    name: "{{ asa_user }}"
    group: "{{ asa_group }}"
    home: "{{ asa_home }}"
    shell: /bin/bash
    state: present

# The container image's internal user is `gameserver` at uid/gid 25000.
# The host bind-mount owner must match that uid or the server can't read
# /home/gameserver inside the container. We pin the host asa user to 25000
# so the mapping is 1:1 without needing user-namespace remapping.
- name: Pin asa group gid to 25000 (matches container's gameserver group)
  group:
    name: "{{ asa_group }}"
    gid: 25000

- name: Pin asa user uid to 25000 (matches container's gameserver user)
  user:
    name: "{{ asa_user }}"
    uid: 25000
    group: "{{ asa_group }}"

# Disable split-lock mitigation. The ASA Windows server (and SteamCMD)
# run under Wine/Proton and issue x86 split-lock atomics from 32-bit
# code; the default mitigation (rate-limit, value=1) sleeps the offending
# thread for ~10 ms per trap, which under heavy load (map-load, content
# download) cumulatively stalls the entire VM and triggers a hypervisor
# watchdog freeze. See: https://docs.kernel.org/x86/buslock.html
- name: Disable split-lock mitigation (Wine/Proton needs warn-only)
  ansible.posix.sysctl:
    name: kernel.split_lock_mitigate
    value: '0'
    state: present
    sysctl_file: /etc/sysctl.d/99-asa-split-lock.conf
    reload: true
  ignore_errors: true   # ansible.posix may not be installed; fall through

- name: Disable split-lock mitigation (fallback when ansible.posix unavailable)
  copy:
    dest: /etc/sysctl.d/99-asa-split-lock.conf
    content: |
      # Wine/Proton runs 32-bit Windows binaries (ASA + SteamCMD) that issue
      # split-lock atomics; the default rate-limit (=1) stalls the VM under load.
      kernel.split_lock_mitigate = 0
    owner: root
    group: root
    mode: '0644'

- name: Apply split-lock sysctl
  command: sysctl -p /etc/sysctl.d/99-asa-split-lock.conf
  changed_when: false

# NOPASSWD sudo is a convenience for cron-driven docker compose lifecycle
# commands. Scope it to a drop-in so it's easy to audit and revert.
- name: Grant passwordless sudo to the asa user
  copy:
    dest: "/etc/sudoers.d/{{ asa_user }}"
    content: "{{ asa_user }} ALL=(ALL) NOPASSWD: ALL\n"
    mode: '0440'
    validate: 'visudo -cf %s'
  when: manage_sudoers | default(true)

# UFW removal is opt-in so we don't silently disable a user's firewall.
# Keep default true to preserve prior behaviour; set `manage_firewall: false`
# to skip and add explicit UFW rules for your map ports yourself.
- name: Ensure ufw is removed
  apt:
    name: ufw
    state: absent
  when: manage_firewall | default(true)
