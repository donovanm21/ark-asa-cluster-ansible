---
# Install Docker Engine + the compose plugin from the official Docker apt
# repository. The distro-packaged docker.io is too old for `docker compose`
# and the compose v2 plugin we drive from cron.

- name: Install apt prerequisites for the Docker repo
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure /etc/apt/keyrings exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Detect distro id for the Docker apt repo
  set_fact:
    _docker_distro: "{{ ansible_distribution | lower }}"

- name: Install the Docker apt signing key
  get_url:
    url: "https://download.docker.com/linux/{{ _docker_distro }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: false

- name: Add the Docker apt repository
  apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ _docker_distro }}
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Install Docker Engine + compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure docker daemon is enabled and running
  service:
    name: docker
    state: started
    enabled: true

# Group membership has to come after docker-ce is installed (which creates
# the `docker` group) — that's why this lives here, not in provision.
- name: Add asa user to docker group
  user:
    name: "{{ asa_user }}"
    groups: docker
    append: true
  when: manage_docker_group | default(true)

- name: Pre-pull the ASA server image
  # Plain `docker pull` instead of community.docker.docker_image so we don't
  # add a collection dependency for a single command.
  command: "docker pull {{ asa_image }}"
  changed_when: false
  failed_when: false
