---
# PvE example — a friendly, faster-progression 3-map ASA cluster.
# Copy to group_vars/gameservers.yml and adjust to taste.

location: "US"           # 2-letter region code for SessionName
server_tag: "MyCluster"  # short tag shown in the Steam browser
server_mode: "PvE"

# Optional Discord webhook — lifecycle events (up/down/restart) are posted here.
# discord_webhook_url: "https://discord.com/api/webhooks/XXXXX/YYYYY"

# Optional external banlist — fetched by ASA on startup.
# banlist_url: "https://example.com/banlist.txt"

# Friendly progression tuning for PvE.
taming_speed_multiplier: 5
harvest_amount_multiplier: 3
harvest_health_multiplier: 2
xp_multiplier: 2
max_tamed_dinos: 5000
override_official_difficulty: 5
player_damage_multiplier: 1.0

# PvE-focused decay: structures and dinos decay slowly so players can travel.
pve_dino_decay_period_multiplier: 5
pve_structure_decay_period_multiplier: 2.5
resources_respawn_period_multiplier: 0.75

motd_duration: 15
motd_message: "Welcome! Keep it friendly. No griefing. See you in game."

# Lifecycle automation — defaults are sensible; tweak if needed.
enable_daily_restart: true
daily_update_hour: 4
enable_dino_wipe: true
dino_wipe_hours: [0, 12]
enable_watchdog: true
watchdog_interval_minutes: 5

# 3-map cluster: each map gets a unique game/query/RCON port,
# and they share cluster_name so players can transfer between them.
maps:
  - map_name_ark: "TheIsland_WP"
    map_name: "TheIsland"
    map_game_port: 7777
    map_query_port: 27015
    map_rcon_port: 27020
    map_admin_password: "CHANGE_ME"
    map_max_players: 70
    map_mods_enabled: ""
    cluster_name: "MyCluster_PvE"
  - map_name_ark: "ScorchedEarth_WP"
    map_name: "ScorchedEarth"
    map_game_port: 7779
    map_query_port: 27017
    map_rcon_port: 27021
    map_admin_password: "CHANGE_ME"
    map_max_players: 70
    map_mods_enabled: ""
    cluster_name: "MyCluster_PvE"
    map_seed_from: "TheIsland"   # hardlink-clone TheIsland's install
  - map_name_ark: "TheCenter_WP"
    map_name: "TheCenter"
    map_game_port: 7785
    map_query_port: 27023
    map_rcon_port: 27024
    map_admin_password: "CHANGE_ME"
    map_max_players: 70
    map_mods_enabled: ""
    cluster_name: "MyCluster_PvE"
    map_seed_from: "TheIsland"   # hardlink-clone TheIsland's install

# Players granted in-game admin (cheat commands). 17-digit SteamIDs.
admins:
  - 76561190000000001
  - 76561190000000002
